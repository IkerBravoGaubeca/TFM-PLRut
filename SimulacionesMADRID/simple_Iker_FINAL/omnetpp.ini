# Example simulation for integrating veins (http://veins.car2x.org/) with Simu5G
# 
# Requirements:
#       You need to enable the feature "Simu5G Cars" for this simulation
#       (Project->Properties->OMNeT++->Project Features)
#
#       You need to import the "veins" project and its subproject
#       "veins_inet" in your workspace.
[General]
*.radioMedium.typename = "LteChannelControl"

**.gNodeB*.nicType = "NRNicEnb"
**.car[*].cellularNic.nicType = "NRNicUe"

cmdenv-express-mode = true
#cmdenv-express-setup = "mpiexec -n 4 sleep infinity"
# parallel-simulation = true
# parsim-num-partitions = 4
# parsim-communications-class = "cMPICommunications"
# parsim-synchronization-class = "cNullMessageProtocol"
# parsim-debug=false
# *.gNodeB[1..500]**.partition-id=0
# *.gNodeB[501..1000]**.partition-id=1
# *.gNodeB[1001..1355]**.partition-id=2
# **.partition-id=3

#**.tolerateMaxDistViolation_ = true


cmdenv-autoflush = true
image-path = ../../images
network = simu5g.simulations.NR.simple_Iker_FINAL.Highway

##########################################################
#            Simulation parameters                       #
##########################################################
debug-on-errors = false
print-undisposed = true

sim-time-limit = 1000s

##########################################################
# Result files configuration
##########################################################

result-dir = results
output-vector-file = ${resultdir}/output.vec
output-scalar-file = ${resultdir}/output.sca
record-eventlog = false

**.vector-recording = false
**.scalar-recording = true

*.playgroundSizeX = 20000m
*.playgroundSizeY = 20000m
*.playgroundSizeZ = 50m



#*.annotations.draw = true
#Obstaculos
*.obstacles.obstacles = xmldoc("config.xml", "//AnalogueModel[@type='RayleighObstacleShadowing']/obstacles")

##########################################################
#            VeinsManager parameters                     #
##########################################################
*.veinsManager.host = "localhost"       # if traci-launchd runs on localhost
*.veinsManager.moduleType = "simu5g.nodes.cars.NRCar"
*.veinsManager.moduleName = "car"
*.veinsManager.launchConfig = xmldoc("sumo.launchd.xml")
*.veinsManager.updateInterval = 0.1s

##########################################################
#                      Mobility                          #
##########################################################
*.car[*].mobility.typename = "VeinsInetMobility"


##########################################################
#          Mobile network specific parameters            #
##########################################################

*.radioMedium.pathLoss.typename = "RayleighFading"
**.propagationModel = "RayleighModel"
**.scenario = "URBAN_MACROCELL" # URBAN_MICROCELL

# Number of Resource Blocks
**.numBands = 200  # 100 200 400 800

# Transmission Power
**.ueTxPower = 26
**.eNodeBTxPower = 46

*.carrierAggregation.componentCarrier[*].numerologyIndex = 2
*.bgCell[*].bgScheduler.numerologyIndex = 2

# Enable dynamic association of UEs (based on best SINR)
*.car[*].cellularNic.nrPhy.dynamicCellAssociation = true
*.car[*].masterId = 0    # ignored if dynamic association is disabled
*.car[*].macCellId = 0    # ignored if dynamic association is disabled
*.car[*].nrMasterId = 1    # ignored if dynamic association is disabled
*.car[*].nrMacCellId = 1    # ignored if dynamic association is disabled

