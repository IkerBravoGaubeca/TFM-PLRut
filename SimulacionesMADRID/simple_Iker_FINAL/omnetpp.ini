*.server.app[0].PacketSize = 200
*.server.app[0].mapName = "map.net.xml"
*.server.app[0].capacityFile = "results/capacidad_madrid_fixed_10_edit_final.json"
*.server.app[0].duarouterPath = "/usr/bin/duarouter"
*.server.app[0].tmpDir = "tmp"
*.server.app[0].defaultCapacity = 2
*.server.app[0].retryInterval = 0.1s
*.server.app[0].violationsFile = "violations_WITHOUT_FINAL.txt"

*.car[*].numApps = 1
*.car[*].app[0].typename = "simu5g.apps.PLRut.CapacityVehicle"
*.car[*].app[0].localPort = 6000
*.car[*].app[0].destPort = 3000
*.car[*].app[0].destAddress = "server"
*.car[*].app[0].PacketSize = 200
*.car[*].app[0].tos = -1
*.car[*].app[0].reportInterval = 0.1s
*.car[*].app[0].travelTimeFile = "results/travel_times_v4_6veh_FINAL.txt"  




